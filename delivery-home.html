<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parcel Locker — Delivery Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="bar">
        <div class="title">📦 Smart Parcel Locker</div>
        <div class="sub">Locker Machine · Building A</div>
        <button class="btn btn-light btn-sm right" id="logout-btn">Log Out</button>
    </div>

    <div class="page text-center">
        <h1 class="h3">What would you like to do?</h1>
        <p class="text-muted" id="signed-as">Signed in as …</p>

        <div class="row g-3 mt-2">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <div class="logo">🚚</div>
                        <h3 class="h5">Store a Parcel</h3>
                        <p class="text-muted small">Drop off an incoming parcel</p>
                        <button class="btn btn-primary w-100" data-action="store">Continue</button>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <div class="logo">📦</div>
                        <h3 class="h5">Collect a Parcel</h3>
                        <p class="text-muted small">Pick up outbound parcels</p>
                        <button class="btn btn-primary w-100" data-action="collect">Continue</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/delivery-home.js"></script>
</body>
</html>
