<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parcel Locker — Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="d-flex justify-content-between align-items-center bg-white border-bottom p-3">
        <div class="brand">📦 Smart Parcel Locker</div>
        <button class="btn btn-light btn-sm" id="logout-btn">Log Out</button>
    </div>

    <div class="page">
        <h1 class="h3" id="hello">Welcome</h1>
        <div class="text-primary fw-semibold" id="role-badge"></div>

        <div class="card mt-3 hidden" id="staff-tile">
            <div class="card-body">
                <h3 class="h5">Store a parcel</h3>
                <p class="text-muted small">Register an incoming parcel, assign a locker and generate a collection code.</p>
                <a class="btn btn-primary" href="store-parcel.html">Store a Parcel</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
