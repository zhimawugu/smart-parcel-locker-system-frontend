<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parcel Locker — Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth">
        <div class="card">
            <div class="card-body">
                <div class="text-center">
                    <div class="logo">📦</div>
                    <h1 class="h4">Smart Parcel Locker</h1>
                    <p class="sub">Sign in to manage your parcels</p>
                </div>

                <form id="login-form">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" id="email" placeholder="you@example.com">

                    <label class="form-label mt-3">Password</label>
                    <input class="form-control" type="password" id="password">

                    <label class="form-label mt-3">Sign in as</label>
                    <div class="seg" id="role-seg">
                        <button type="button" data-role="RESIDENT" class="active">Resident</button>
                        <button type="button" data-role="PROPERTY_MANAGER">Property Manager</button>
                    </div>

                    <button class="btn btn-primary w-100 mt-3" type="submit" id="login-btn">Log In</button>
                    <p class="text-danger text-center mt-2 hidden" id="login-msg"></p>
                </form>

                <p class="text-center mt-3 mb-0">New resident? <a href="register.html">Create an account</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
