<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parcel Locker — Staff Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/css/index.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <a class="btn btn-light btn-sm back-fixed" href="resident-home.html">‹ Back</a>

    <div class="machine">
        <div class="text-center mb-3">
            <div class="brand">📦 Smart Parcel Locker</div>
            <div class="sub">Locker Machine · Building A</div>
        </div>

        <div class="card machine-card">
            <div class="card-body">
                <h1 class="h4 text-center">Sign In</h1>
                <p class="sub text-center">Tap a field, then type with the keyboard below</p>

                <form id="login-form">
                    <label class="form-label">Username</label>
                    <input class="form-control" type="email" id="email" placeholder="staff@example.com" autocomplete="off">

                    <label class="form-label mt-3">Password</label>
                    <input class="form-control" type="password" id="password" autocomplete="off">

                    <div class="machine-keyboard mt-3">
                        <div class="simple-keyboard"></div>
                    </div>

                    <button class="btn btn-primary w-100 mt-3" type="submit" id="login-btn">Log In</button>
                    <p class="text-danger text-center mt-2 hidden" id="login-msg"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-keyboard@3/build/index.js"></script>
    <script src="js/app.js"></script>
    <script src="js/machine-login.js"></script>
</body>
</html>
