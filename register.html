<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parcel Locker — Create account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="auth">
        <div class="card">
            <div class="card-body">
                <div class="text-center">
                    <div class="logo">📦</div>
                    <h1 class="h4">Create your account</h1>
                    <p class="sub">Register as a resident</p>
                </div>

                <form id="register-form">
                    <label class="form-label">Full name</label>
                    <input class="form-control" type="text" id="fullName" placeholder="Jane Doe">

                    <label class="form-label mt-3">Email</label>
                    <input class="form-control" type="email" id="email" placeholder="you@example.com">

                    <label class="form-label mt-3">Password</label>
                    <input class="form-control" type="password" id="password" placeholder="8–20 characters">

                    <button class="btn btn-primary w-100 mt-3" type="submit" id="register-btn">Create account</button>
                    <p class="text-center mt-2 hidden" id="register-msg"></p>
                </form>

                <p class="text-center mt-3 mb-0">Already have an account? <a href="index.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
